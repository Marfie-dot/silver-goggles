<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jahrgangskoordination</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e0dfd6;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:500;flex:1}
.sync-ok{background:#eaf3de;color:#3b6d11}.sync-err{background:#fcebeb;color:#a32d2d}.sync-loading{background:#faeeda;color:#854f0b}
.sync-status{font-size:12px;padding:3px 10px;border-radius:6px;font-weight:500}
.container{max-width:820px;margin:24px auto;padding:0 16px}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid #d3d1c7;align-items:center}
.tab{padding:10px 20px;cursor:pointer;font-size:14px;color:#5f5e5a;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#1a1a18;border-bottom:2px solid #1a1a18;font-weight:500}
.card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:16px 20px;margin-bottom:12px}
h2{font-size:16px;font-weight:500;margin-bottom:12px}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
input[type=text],input[type=password]{flex:1;min-width:120px;font-size:14px;padding:7px 10px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18}
input:focus{outline:none;border-color:#888780}
button{font-size:13px;padding:7px 14px;cursor:pointer;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a18}
button:hover{background:#f1efe8}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn-danger{background:#fcebeb;color:#a32d2d;border-color:#f7c1c1}
/* Status */
.status-green{background:#eaf3de;color:#2d6a0a;border:1px solid #b5d98a}
.status-yellow{background:#fffbe6;color:#7a6000;border:1px solid #f0d060}
.status-orange{background:#fff0e0;color:#8a4500;border:1px solid #f0b060}
.status-red{background:#fcebeb;color:#a32d2d;border:1px solid #f7c1c1}
.status-open{background:#f1efe8;color:#5f5e5a;border:1px solid #d3d1c7}
.status-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:500}
/* Jahrgang */
.jg-block{margin-bottom:20px;border-radius:12px;overflow:hidden;border:1px solid #d3d1c7}
.jg-header{padding:10px 20px;font-size:15px;font-weight:500;color:#fff;cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center}
.jg-header:hover{opacity:0.92}
.jg-chevron{font-size:13px;transition:transform 0.2s;flex-shrink:0}
.jg-body{background:#fff;padding:12px 16px}
.kl-section{margin-bottom:16px}
.kl-title{font-size:13px;font-weight:600;margin-bottom:8px;padding:5px 8px;border-radius:6px}
/* Abstimmung */
.vote-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #f5f5f0;flex-wrap:wrap}
.vote-row:last-child{border-bottom:none}
.fach-cell{font-size:13px;min-width:90px;flex:1;font-weight:500}
.hj-label{font-size:11px;color:#888780;flex-shrink:0}
.vote-btn{font-size:12px;padding:4px 10px;cursor:pointer;border-radius:7px;border:1px solid #d3d1c7;background:#f1efe8;color:#5f5e5a}
.vote-btn.yes{background:#eaf3de;color:#2d6a0a;border-color:#b5d98a}
.vote-btn.no{background:#fcebeb;color:#a32d2d;border-color:#f7c1c1}
.vote-btn:disabled{opacity:0.35;cursor:not-allowed}
.chip{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.chip-assigned{background:#e6f1fb;color:#185fa5}
.chip-extra{background:#fff0e0;color:#8a4500}
.chip-open{background:#f1efe8;color:#888780}
/* Progress */
.progress-bar{height:4px;background:#f1efe8;border-radius:2px;margin-bottom:16px}
.progress-fill{height:4px;border-radius:2px;transition:width 0.3s;background:#639922}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.metric{background:#f1efe8;border-radius:8px;padding:10px 14px}
.metric-label{font-size:12px;color:#5f5e5a;margin-bottom:2px}
.metric-value{font-size:20px;font-weight:500}
.kuerzel-banner{background:#fff;border:1px solid #d3d1c7;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.anleitung{background:#e6f1fb;border:1px solid #b5d0f0;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#1a1a18;line-height:1.6}
/* Admin */
.klasse-chip{background:#f1efe8;border:1px solid #d3d1c7;border-radius:6px;padding:3px 10px;font-size:13px;display:inline-flex;align-items:center;gap:6px;margin:3px}
.klasse-block{padding-left:12px;border-left:2px solid #e0dfd6;margin-bottom:12px}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;padding:6px 8px;font-weight:500;color:#5f5e5a;border-bottom:1px solid #d3d1c7}
td{padding:6px 8px;border-bottom:1px solid #f1efe8}
</style>
</head>
<body>
<div id="main-screen">
  <div class="topbar">
    <h1>Jahrgangskoordination</h1>
    <span id="sync-badge" class="sync-status sync-loading">Verbinde…</span>
    <button onclick="syncNow()" style="font-size:12px;padding:4px 10px">↻ Sync</button>
    <button id="admin-login-btn" style="font-size:12px;padding:4px 10px" onclick="toggleAdminLogin()">🔒 Admin</button>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('abstimmung')">Abstimmung</button>
      <button class="tab" id="tab-btn-uebersicht" style="display:none" onclick="showTab('uebersicht')">Übersicht</button>
      <button class="tab" id="tab-btn-admin" style="display:none" onclick="showTab('admin')">Verwaltung</button>
    </div>
    <div id="admin-login-box" style="display:none;background:#fff;border:1px solid #d3d1c7;border-radius:10px;padding:14px 16px;margin-bottom:16px;gap:8px;flex-wrap:wrap">
      <input type="password" id="admin-pw-input" placeholder="Admin-Passwort"/>
      <button class="btn-primary" onclick="checkAdminPw()">Anmelden</button>
      <span id="admin-pw-error" style="font-size:12px;color:#a32d2d;display:none">Falsches Passwort</span>
    </div>
    <div id="tab-abstimmung"></div>
    <div id="tab-uebersicht" style="display:none"></div>
    <div id="tab-admin" style="display:none"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://yufxmqqwlsoncnkdcmok.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1ZnhtcXF3bHNvbmNua2RjbW9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTAyNjAsImV4cCI6MjA5NjIyNjI2MH0.G6k5avWiblXCw75wcNIVWioUIu3cHDXwVIE5jBUmnEI';
const TABLE='MBKoordination';
const ROW_ID=1;
const ADMIN_PW='Schule2025';
const JG_COLORS=['#4a7c59','#2e6da4','#8b5e3c','#7b3f9e','#b5520a','#1a6b7a','#8a3a3a','#4a6b2a'];

let state={jahrgaenge:[],votes:{},neins:{},extras:{}};
let syncTimer=null,isAdmin=false;
let myKuerzel=localStorage.getItem('mb_kuerzel')||'';
const openJg=new Set();

function hdrs(){return{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};}

async function remoteGet(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}&select=data`,{headers:hdrs()});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const rows=await r.json();
  if(!rows.length)return null;
  const d=JSON.parse(rows[0].data);
  if(!d.votes)d.votes={};
  if(!d.neins)d.neins={};
  if(!d.extras)d.extras={};
  return d;
}

async function remotePut(d){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
    method:'POST',headers:{...hdrs(),'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id:ROW_ID,data:JSON.stringify(d)})
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
}

function setSS(s,t){const b=document.getElementById('sync-badge');if(!b)return;b.className='sync-status sync-'+s;b.textContent=t;}

async function syncNow(){
  setSS('loading','Synchronisiere…');
  try{const r=await remoteGet();if(r)state=r;setSS('ok','✓ Synchronisiert');render();}
  catch(e){setSS('err','✗ Fehler');}
}
function startAutoSync(){if(syncTimer)clearInterval(syncTimer);syncTimer=setInterval(syncNow,30000);syncNow();}
async function save(){
  setSS('loading','Speichere…');
  try{await remotePut(state);setSS('ok','✓ Gespeichert');}
  catch(e){setSS('err','✗ Fehler: '+e.message);}
}
function uid(){return Math.random().toString(36).slice(2,8);}

function toggleJg(id){
  if(openJg.has(id))openJg.delete(id);
  else openJg.add(id);
  render();
}

function vkey(klId,fach,slot){return klId+'|'+fach+'|'+slot;}
function nkey(klId,fach,slot,kue){return klId+'|'+fach+'|'+slot+'|'+kue;}
function getVote(klId,fach,slot){return (state.votes||{})[vkey(klId,fach,slot)]||null;}
function getExtras(klId,fach,slot){return (state.extras||{})[vkey(klId,fach,slot)]||[];}
function getNein(klId,fach,slot,kue){return !!(state.neins||{})[nkey(klId,fach,slot,kue)];}

function checkAllNein(klId,fach){
  const voters=new Set();
  for(const k of Object.keys(state.neins||{})){
    const parts=k.split('|');
    if(parts[0]===klId&&parts[1]===fach)voters.add(parts[3]);
  }
  if(voters.size===0)return false;
  for(const kue of voters){
    if(!getNein(klId,fach,'slot1',kue)||!getNein(klId,fach,'slot2',kue))return false;
  }
  return !getVote(klId,fach,'slot1')&&!getVote(klId,fach,'slot2');
}

function statusBadge(status){
  switch(status){
    case 'full':    return '<span class="status-badge status-green">✓ vollständig</span>';
    case 'partial': return '<span class="status-badge status-yellow">◑ unvollständig</span>';
    case 'conflict':return '<span class="status-badge status-orange">⚠ Konflikt</span>';
    case 'allnein': return '<span class="status-badge status-red">✗ alle Nein</span>';
    default:        return '<span class="status-badge status-open">○ offen</span>';
  }
}

function calcProgress(){
  let total=0,done=0;
  for(const jg of (state.jahrgaenge||[]))
    for(const kl of jg.klassen)
      for(const f of (kl.faecher||[])){
        total+=2;
        if(getVote(kl.id,f,'slot1'))done++;
        if(getVote(kl.id,f,'slot2'))done++;
      }
  return{total,done};
}

function render(){renderAbstimmung();renderUebersicht();renderAdmin();}

function renderAbstimmung(){
  const el=document.getElementById('tab-abstimmung');
  if(!el)return;
  const prog=calcProgress();
  const pct=prog.total?Math.round(prog.done/prog.total*100):0;

  let html=`<div class="anleitung">
    <b>So funktioniert die Abstimmung:</b> Trage oben dein Kürzel ein und klicke auf OK. Suche dann deine Klassen und Fächer in der Liste und klicke auf <b>✓ Ja</b> für das Halbjahr, in dem du das Aufgabenformat umsetzen möchtest. Mit <b>✗ Nein</b> signalisierst du, dass du nicht zur Verfügung stehst. Deine Abstimmung wird sofort gespeichert und ist für alle sichtbar.
  </div>
  <div class="kuerzel-banner">
    <span style="font-size:13px;font-weight:500;flex-shrink:0">Mein Kürzel:</span>
    <input type="text" id="kuerzel-input" value="${myKuerzel}" placeholder="z.B. SPY" style="max-width:90px"/>
    <button class="btn-primary" onclick="saveKuerzel()" style="font-size:12px;padding:5px 12px">OK</button>
    ${myKuerzel
      ?`<span style="font-size:13px;color:#2d6a0a;font-weight:500">✓ Eingeloggt als <b>${myKuerzel}</b></span>`
      :`<span style="font-size:12px;color:#854f0b">⚠ Bitte zuerst Kürzel eintragen</span>`}
  </div>
  <div class="summary-grid">
    <div class="metric"><div class="metric-label">Slots besetzt</div><div class="metric-value">${prog.done}/${prog.total}</div></div>
    <div class="metric"><div class="metric-label">Vollständig</div><div class="metric-value">${pct}%</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <p style="font-size:12px;color:#888780;margin-bottom:16px">Wird alle 30 Sekunden automatisch aktualisiert.</p>`;

  (state.jahrgaenge||[]).forEach((jg,idx)=>{
    const color=JG_COLORS[idx%JG_COLORS.length];
    const isOpen=openJg.has(jg.id);
    const aufgabe=jg.aufgabe?` <span style="font-size:12px;font-weight:400;opacity:0.9">– ${jg.aufgabe}</span>`:'';
    html+=`<div class="jg-block" style="border-color:${color}55">
      <div class="jg-header" style="background:${color}" onclick="toggleJg('${jg.id}')">
        <span>${jg.name}${aufgabe}</span>
        <span class="jg-chevron" style="transform:${isOpen?'rotate(0deg)':'rotate(-90deg)'}">▾</span>
      </div>
      <div style="display:${isOpen?'block':'none'};background:#fff;padding:12px 16px">`;

    for(const kl of jg.klassen){
      if(!(kl.faecher||[]).length)continue;
      html+=`<div class="kl-section">
        <div class="kl-title" style="background:${color}18;color:${color}">${kl.name}</div>`;
      for(const fach of kl.faecher){
        const v1=getVote(kl.id,fach,'slot1');
        const v2=getVote(kl.id,fach,'slot2');
        const ex1=getExtras(kl.id,fach,'slot1');
        const ex2=getExtras(kl.id,fach,'slot2');
        const myN1=myKuerzel&&getNein(kl.id,fach,'slot1',myKuerzel);
        const myN2=myKuerzel&&getNein(kl.id,fach,'slot2',myKuerzel);
        const myYes1=myKuerzel&&(v1===myKuerzel||ex1.includes(myKuerzel));
        const myYes2=myKuerzel&&(v2===myKuerzel||ex2.includes(myKuerzel));
        const fJs=fach.replace(/'/g,"\\'");
        const canVote=!!myKuerzel;
        html+=`<div class="vote-row">
          <span class="fach-cell">${fach}</span>
          <span class="hj-label">1. HJ</span>`;
        html+=renderSlot(kl.id,fJs,v1,ex1,myYes1,myN1,canVote,'slot1');
        html+=`<span class="hj-label" style="margin-left:6px">2. HJ</span>`;
        html+=renderSlot(kl.id,fJs,v2,ex2,myYes2,myN2,canVote,'slot2');
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div></div>`;
  });

  if(!(state.jahrgaenge||[]).length)
    html+=`<p style="color:#5f5e5a;font-size:13px;padding:16px 0">Noch keine Jahrgänge angelegt.</p>`;
  el.innerHTML=html;
}

function renderSlot(klId,fJs,assigned,extras,myYes,myNein,canVote,slot){
  let h='';
  if(assigned&&!myYes){
    h+=`<span class="chip chip-assigned">✓ ${assigned}</span>`;
    if(extras.length)h+=`<span class="chip chip-extra">⚠ auch: ${extras.join(', ')}</span>`;
    if(canVote)h+=`<button class="vote-btn" onclick="castJa('${klId}','${fJs}','${slot}')" title="Auch Ja klicken">+ Ja</button>`;
  }else{
    const btnYesCls=myYes?'yes':'';
    const btnNeinCls=myNein?'no':'';
    if(canVote){
      h+=`<button class="vote-btn ${btnYesCls}" onclick="castJa('${klId}','${fJs}','${slot}')">✓ Ja</button>`;
      h+=`<button class="vote-btn ${btnNeinCls}" onclick="castNein('${klId}','${fJs}','${slot}')">✗ Nein</button>`;
    }else{
      h+=`<button class="vote-btn" disabled>✓ Ja</button>`;
      h+=`<button class="vote-btn" disabled>✗ Nein</button>`;
    }
    if(assigned)h+=`<span class="chip chip-assigned">✓ ${assigned}</span>`;
    if(extras.length)h+=`<span class="chip chip-extra">⚠ auch: ${extras.join(', ')}</span>`;
    if(!assigned&&!extras.length&&!myYes&&!myNein)h+=`<span class="chip chip-open">offen</span>`;
  }
  return h;
}

function saveKuerzel(){
  const v=document.getElementById('kuerzel-input').value.trim().toUpperCase();
  if(!v)return;
  myKuerzel=v;
  localStorage.setItem('mb_kuerzel',v);
  render();
}

async function saveAufgabe(jgId){
  const i=document.getElementById('aufgabe-'+jgId);
  if(!i)return;
  const jg=state.jahrgaenge.find(j=>j.id===jgId);
  if(jg){jg.aufgabe=i.value.trim();render();await save();}
}

async function castJa(klId,fach,slot){
  if(!myKuerzel)return;
  const k=vkey(klId,fach,slot);
  if(!state.votes)state.votes={};
  if(!state.extras)state.extras={};
  if(!state.neins)state.neins={};
  delete state.neins[nkey(klId,fach,slot,myKuerzel)];
  const current=state.votes[k];
  if(current===myKuerzel){
    delete state.votes[k];
  }else if(!current){
    state.votes[k]=myKuerzel;
  }else{
    if(!state.extras[k])state.extras[k]=[];
    const idx=state.extras[k].indexOf(myKuerzel);
    if(idx>=0)state.extras[k].splice(idx,1);
    else state.extras[k].push(myKuerzel);
  }
  render();await save();
}

async function castNein(klId,fach,slot){
  if(!myKuerzel)return;
  if(!state.neins)state.neins={};
  if(!state.votes)state.votes={};
  if(!state.extras)state.extras={};
  const nk=nkey(klId,fach,slot,myKuerzel);
  const vk=vkey(klId,fach,slot);
  if(state.votes[vk]===myKuerzel)delete state.votes[vk];
  if(state.extras[vk]){const i=state.extras[vk].indexOf(myKuerzel);if(i>=0)state.extras[vk].splice(i,1);}
  if(state.neins[nk])delete state.neins[nk];
  else state.neins[nk]=true;
  render();await save();
}

function renderUebersicht(){
  const el=document.getElementById('tab-uebersicht');
  if(!el)return;
  let html='';
  (state.jahrgaenge||[]).forEach((jg,idx)=>{
    const color=JG_COLORS[idx%JG_COLORS.length];
    if(!jg.klassen.length)return;
    const aufgabe=jg.aufgabe?` <span style="font-size:12px;font-weight:400;opacity:0.9">– ${jg.aufgabe}</span>`:'';
    html+=`<div class="jg-block" style="border-color:${color}55;margin-bottom:16px">
      <div class="jg-header" style="background:${color};cursor:default">
        <span>${jg.name}${aufgabe}</span>
      </div>
      <div class="jg-body" style="padding:0">
      <table>
        <tr><th>Klasse</th><th>1. Halbjahr</th><th>2. Halbjahr</th><th>Status</th></tr>`;
    for(const kl of jg.klassen){
      const faecher=kl.faecher||[];
      const ja1=faecher.find(f=>getVote(kl.id,f,'slot1'));
      const ja2=faecher.find(f=>getVote(kl.id,f,'slot2'));
      const extras1=faecher.some(f=>getExtras(kl.id,f,'slot1').length>0);
      const extras2=faecher.some(f=>getExtras(kl.id,f,'slot2').length>0);
      const conflict=(ja1&&extras1)||(ja2&&extras2);
      const alleNein=!ja1&&!ja2&&faecher.some(f=>checkAllNein(kl.id,f));
      let status;
      if(conflict)status='conflict';
      else if(ja1&&ja2)status='full';
      else if(ja1||ja2)status='partial';
      else if(alleNein)status='allnein';
      else status='open';
      html+=`<tr>
        <td style="color:${color};font-weight:500">${kl.name}</td>
        <td>${ja1?`<span class="chip chip-assigned">✓ ${getVote(kl.id,ja1,'slot1')}</span>`:'—'}</td>
        <td>${ja2?`<span class="chip chip-assigned">✓ ${getVote(kl.id,ja2,'slot2')}</span>`:'—'}</td>
        <td>${statusBadge(status)}</td>
      </tr>`;
    }
    html+=`</table></div></div>`;
  });
  el.innerHTML=html||'<p style="color:#5f5e5a;font-size:13px">Noch keine Daten.</p>';
}

function renderAdmin(){
  const el=document.getElementById('tab-admin');
  if(!el)return;
  let html=`<div class="card"><h2>Jahrgang hinzufügen</h2>
    <div class="row">
      <input type="text" id="new-jg-name" placeholder="z.B. Jahrgang 5"/>
      <button onclick="addJahrgang()">+ Jahrgang</button>
    </div></div>`;

  (state.jahrgaenge||[]).forEach((jg,idx)=>{
    const color=JG_COLORS[idx%JG_COLORS.length];
    html+=`<div class="card" style="border-left:4px solid ${color}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0;color:${color}">${jg.name}</h2>
        <button class="btn-danger" onclick="removeJahrgang('${jg.id}')">Entfernen</button>
      </div>
      <div class="row" style="margin-bottom:10px">
        <input type="text" id="aufgabe-${jg.id}" value="${jg.aufgabe||''}" placeholder="Aufgabe, z.B. Lernentwicklungsgespräche" style="font-size:13px"/>
        <button onclick="saveAufgabe('${jg.id}')" style="font-size:12px">Aufgabe speichern</button>
      </div>
      <div class="row" style="margin-bottom:10px">
        <input type="text" id="new-kl-${jg.id}" placeholder="Klasse, z.B. 5aG" style="max-width:160px"/>
        <button onclick="addKlasse('${jg.id}')">+ Klasse</button>
      </div>`;

    for(const kl of jg.klassen){
      html+=`<div class="klasse-block">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:14px;font-weight:500;color:${color}">${kl.name}</span>
          <button class="btn-danger" style="font-size:11px;padding:2px 7px" onclick="removeKlasse('${jg.id}','${kl.id}')">× Klasse</button>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">`;
      for(const f of (kl.faecher||[])){
        html+=`<span class="klasse-chip">${f}
          <button class="btn-danger" style="font-size:10px;padding:1px 5px;border-radius:3px" onclick="removeFach('${jg.id}','${kl.id}','${f.replace(/'/g,"\\'")}')">×</button>
        </span>`;
      }
      html+=`</div>
        <div class="row">
          <input type="text" id="new-f-${kl.id}" placeholder="Fach, z.B. Biologie" style="max-width:200px;font-size:13px"/>
          <button onclick="addFach('${jg.id}','${kl.id}')" style="font-size:12px">+ Fach</button>
        </div>
      </div>`;
    }
    html+=`</div>`;
  });

  html+=`<div class="card" style="margin-top:8px;border-left:4px solid #a32d2d">
    <h2>Abstimmungen zurücksetzen</h2>
    <p style="font-size:13px;color:#5f5e5a;margin-bottom:12px">Löscht alle Abstimmungen. Jahrgänge, Klassen und Fächer bleiben erhalten.</p>
    <div class="row">
      <input type="password" id="reset-pw" placeholder="Admin-Passwort zur Bestätigung" style="max-width:280px"/>
      <button class="btn-danger" onclick="resetVotes()">Zurücksetzen</button>
    </div>
    <span id="reset-pw-error" style="font-size:12px;color:#a32d2d;display:none">Falsches Passwort</span>
  </div>`;
  el.innerHTML=html;
}

async function addJahrgang(){const i=document.getElementById('new-jg-name');if(!i||!i.value.trim())return;if(!state.jahrgaenge)state.jahrgaenge=[];state.jahrgaenge.push({id:uid(),name:i.value.trim(),aufgabe:'',klassen:[]});i.value='';render();await save();}
async function removeJahrgang(id){if(!confirm('Jahrgang wirklich entfernen?'))return;state.jahrgaenge=state.jahrgaenge.filter(j=>j.id!==id);render();await save();}
async function addKlasse(jgId){const i=document.getElementById('new-kl-'+jgId);if(!i||!i.value.trim())return;const jg=state.jahrgaenge.find(j=>j.id===jgId);if(jg)jg.klassen.push({id:uid(),name:i.value.trim(),faecher:[]});i.value='';render();await save();}
async function removeKlasse(jgId,klId){const jg=state.jahrgaenge.find(j=>j.id===jgId);if(jg)jg.klassen=jg.klassen.filter(k=>k.id!==klId);render();await save();}
async function addFach(jgId,klId){const i=document.getElementById('new-f-'+klId);if(!i||!i.value.trim())return;const jg=state.jahrgaenge.find(j=>j.id===jgId);const kl=jg&&jg.klassen.find(k=>k.id===klId);if(kl){if(!kl.faecher)kl.faecher=[];if(!kl.faecher.includes(i.value.trim()))kl.faecher.push(i.value.trim());}i.value='';render();await save();}
async function removeFach(jgId,klId,fach){const jg=state.jahrgaenge.find(j=>j.id===jgId);const kl=jg&&jg.klassen.find(k=>k.id===klId);if(kl)kl.faecher=(kl.faecher||[]).filter(f=>f!==fach);render();await save();}

async function resetVotes(){
  const pw=document.getElementById('reset-pw').value;
  const err=document.getElementById('reset-pw-error');
  if(pw!==ADMIN_PW){err.style.display='block';return;}
  err.style.display='none';
  state.votes={};state.neins={};state.extras={};
  render();await save();
  document.getElementById('reset-pw').value='';
}

function showTab(name){
  ['abstimmung','uebersicht','admin'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'':'none';});
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['abstimmung','uebersicht','admin'][i]===name);});
}

function toggleAdminLogin(){
  if(isAdmin){
    isAdmin=false;
    document.getElementById('tab-btn-uebersicht').style.display='none';
    document.getElementById('tab-btn-admin').style.display='none';
    document.getElementById('admin-login-btn').textContent='🔒 Admin';
    document.getElementById('admin-login-box').style.display='none';
    showTab('abstimmung');
  }else{
    const box=document.getElementById('admin-login-box');
    box.style.display=box.style.display==='flex'?'none':'flex';
  }
}

function checkAdminPw(){
  const pw=document.getElementById('admin-pw-input').value;
  const err=document.getElementById('admin-pw-error');
  if(pw===ADMIN_PW){
    isAdmin=true;
    document.getElementById('admin-login-box').style.display='none';
    document.getElementById('tab-btn-uebersicht').style.display='';
    document.getElementById('tab-btn-admin').style.display='';
    document.getElementById('admin-login-btn').textContent='🔓 Admin';
    document.getElementById('admin-pw-input').value='';
    err.style.display='none';
  }else{err.style.display='';}
}

startAutoSync();
</script>
</body>
</html>
