<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jahrgangskoordination</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e0dfd6;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:500;flex:1}
.sync-ok{background:#eaf3de;color:#3b6d11}.sync-err{background:#fcebeb;color:#a32d2d}.sync-loading{background:#faeeda;color:#854f0b}
.sync-status{font-size:12px;padding:3px 10px;border-radius:6px;font-weight:500}
.container{max-width:820px;margin:24px auto;padding:0 16px}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid #d3d1c7;align-items:center}
.tab{padding:10px 20px;cursor:pointer;font-size:14px;color:#5f5e5a;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#1a1a18;border-bottom:2px solid #1a1a18;font-weight:500}
.card{background:#fff;border:1px solid #d3d1c7;border-radius:12px;padding:16px 20px;margin-bottom:12px}
h2{font-size:16px;font-weight:500;margin-bottom:12px}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
input[type=text],input[type=password]{flex:1;min-width:120px;font-size:14px;padding:7px 10px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18}
input:focus{outline:none;border-color:#888780}
button{font-size:13px;padding:7px 14px;cursor:pointer;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a18}
button:hover{background:#f1efe8}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn-danger{background:#fcebeb;color:#a32d2d;border-color:#f7c1c1}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.badge-open{background:#f1efe8;color:#5f5e5a}
.badge-done{background:#e6f1fb;color:#185fa5}
.badge-warn{background:#faeeda;color:#854f0b}
.badge-no{background:#fcebeb;color:#a32d2d}
.jg-block{margin-bottom:20px;border-radius:12px;overflow:hidden;border:1px solid #d3d1c7}
.jg-header{padding:10px 20px;font-size:15px;font-weight:500;color:#fff}
.jg-body{background:#fff;padding:12px 16px}
.kl-section{margin-bottom:18px}
.kl-title{font-size:13px;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e8e7e0}
.vote-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f0;flex-wrap:wrap}
.vote-row:last-child{border-bottom:none}
.fach-cell{font-size:13px;min-width:100px;flex:1}
.hj-label{font-size:11px;color:#888780;flex-shrink:0;width:42px}
.vote-btn{font-size:12px;padding:4px 10px;cursor:pointer;border-radius:7px;border:1px solid #d3d1c7;background:#f1efe8;color:#5f5e5a}
.vote-btn.yes{background:#eaf3de;color:#3b6d11;border-color:#c0dd97}
.assigned-chip{font-size:11px;padding:2px 8px;border-radius:6px;background:#e6f1fb;color:#185fa5;font-weight:500}
.extra-chip{font-size:11px;padding:2px 8px;border-radius:6px;background:#faeeda;color:#854f0b;font-weight:500}
.open-chip{font-size:11px;padding:2px 8px;border-radius:6px;background:#f1efe8;color:#888780}
.new-fach-row{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
.kuerzel-banner{background:#fff;border:1px solid #d3d1c7;border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.progress-bar{height:4px;background:#f1efe8;border-radius:2px;margin-bottom:16px}
.progress-fill{height:4px;border-radius:2px;transition:width 0.3s}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.metric{background:#f1efe8;border-radius:8px;padding:10px 14px}
.metric-label{font-size:12px;color:#5f5e5a;margin-bottom:2px}
.metric-value{font-size:20px;font-weight:500}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;padding:6px 8px;font-weight:500;color:#5f5e5a;border-bottom:1px solid #d3d1c7}
td{padding:6px 8px;border-bottom:1px solid #f1efe8}
</style>
</head>
<body>
<div id="main-screen">
  <div class="topbar">
    <h1>Jahrgangskoordination</h1>
    <span id="sync-badge" class="sync-status sync-loading">Verbinde…</span>
    <button onclick="syncNow()" style="font-size:12px;padding:4px 10px">↻ Sync</button>
    <button id="admin-login-btn" style="font-size:12px;padding:4px 10px" onclick="toggleAdminLogin()">🔒 Admin</button>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('abstimmung')">Abstimmung</button>
      <button class="tab" id="tab-btn-uebersicht" style="display:none" onclick="showTab('uebersicht')">Übersicht</button>
      <button class="tab" id="tab-btn-admin" style="display:none" onclick="showTab('admin')">Verwaltung</button>
    </div>
    <div id="admin-login-box" style="display:none;background:#fff;border:1px solid #d3d1c7;border-radius:10px;padding:14px 16px;margin-bottom:16px;gap:8px;flex-wrap:wrap">
      <input type="password" id="admin-pw-input" placeholder="Admin-Passwort"/>
      <button class="btn-primary" onclick="checkAdminPw()">Anmelden</button>
      <span id="admin-pw-error" style="font-size:12px;color:#a32d2d;display:none">Falsches Passwort</span>
    </div>
    <div id="tab-abstimmung"></div>
    <div id="tab-uebersicht" style="display:none"></div>
    <div id="tab-admin" style="display:none"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://yufxmqqwlsoncnkdcmok.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1ZnhtcXF3bHNvbmNua2RjbW9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTAyNjAsImV4cCI6MjA5NjIyNjI2MH0.G6k5avWiblXCw75wcNIVWioUIu3cHDXwVIE5jBUmnEI';
const TABLE='MBKoordination';
const ROW_ID=1;
const ADMIN_PW='Schule2025';
const JG_COLORS=['#4a7c59','#2e6da4','#8b5e3c','#7b3f9e','#b5520a','#1a6b7a','#8a3a3a','#4a6b2a'];

// State:
// jahrgaenge: [{id, name, klassen: [{id, name}]}]
// eintraege: [{id, klId, fach, slot1: kuerzel|null, slot2: kuerzel|null, extras1:[], extras2:[]}]
// Eintraege werden von Kollegen selbst angelegt

let state={jahrgaenge:[],eintraege:[]};
let syncTimer=null,isAdmin=false;
let myKuerzel=localStorage.getItem('mb_kuerzel')||'';

function hdrs(){return{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};}
async function remoteGet(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}&select=data`,{headers:hdrs()});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const rows=await r.json();
  return rows.length?JSON.parse(rows[0].data):null;
}
async function remotePut(d){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`,{
    method:'POST',headers:{...hdrs(),'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id:ROW_ID,data:JSON.stringify(d)})
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
}
function setSS(s,t){const b=document.getElementById('sync-badge');if(!b)return;b.className='sync-status sync-'+s;b.textContent=t;}
async function syncNow(){
  setSS('loading','Synchronisiere…');
  try{const r=await remoteGet();if(r){state=r;if(!state.eintraege)state.eintraege=[];}setSS('ok','✓ Synchronisiert');render();}
  catch(e){setSS('err','✗ Fehler');}
}
function startAutoSync(){if(syncTimer)clearInterval(syncTimer);syncTimer=setInterval(syncNow,30000);syncNow();}
async function save(){
  setSS('loading','Speichere…');
  try{await remotePut(state);setSS('ok','✓ Gespeichert');}
  catch(e){setSS('err','✗ Fehler: '+e.message);}
}
function uid(){return Math.random().toString(36).slice(2,8);}

function getEintrag(klId,fach){return (state.eintraege||[]).find(e=>e.klId===klId&&e.fach===fach)||null;}

function calcProgress(){
  let total=0,done=0;
  for(const e of (state.eintraege||[])){total+=2;if(e.slot1)done++;if(e.slot2)done++;}
  return{total,done};
}

function render(){renderAbstimmung();renderUebersicht();renderAdmin();}

function renderAbstimmung(){
  const el=document.getElementById('tab-abstimmung');
  if(!el)return;
  const prog=calcProgress();
  const pct=prog.total?Math.round(prog.done/prog.total*100):0;

  let html=`<div class="kuerzel-banner">
    <span style="font-size:13px;font-weight:500;flex-shrink:0">Mein Kürzel:</span>
    <input type="text" id="kuerzel-input" value="${myKuerzel}" placeholder="z.B. SPX" style="max-width:90px"/>
    <button class="btn-primary" onclick="saveKuerzel()" style="font-size:12px;padding:5px 12px">OK</button>
    ${myKuerzel
      ?`<span style="font-size:13px;color:#3b6d11;font-weight:500">✓ Eingeloggt als <b>${myKuerzel}</b></span>`
      :`<span style="font-size:12px;color:#854f0b">⚠ Bitte zuerst Kürzel eintragen</span>`}
  </div>
  <div class="summary-grid">
    <div class="metric"><div class="metric-label">Slots besetzt</div><div class="metric-value">${prog.done}/${prog.total}</div></div>
    <div class="metric"><div class="metric-label">Vollständig</div><div class="metric-value">${pct}%</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:#639922"></div></div>`;

  (state.jahrgaenge||[]).forEach((jg,idx)=>{
    const color=JG_COLORS[idx%JG_COLORS.length];
    html+=`<div class="jg-block" style="border-color:${color}55">
      <div class="jg-header" style="background:${color}">${jg.name}</div>
      <div class="jg-body">`;
    for(const kl of jg.klassen){
      const klEintraege=(state.eintraege||[]).filter(e=>e.klId===kl.id);
      html+=`<div class="kl-section">
        <div class="kl-title" style="color:${color}">${kl.name}</div>`;

      // Bestehende Einträge anzeigen
      for(const e of klEintraege){
        const iMine1=myKuerzel&&e.slot1===myKuerzel;
        const iMine2=myKuerzel&&e.slot2===myKuerzel;
        const iInExtras1=myKuerzel&&(e.extras1||[]).includes(myKuerzel);
        const iInExtras2=myKuerzel&&(e.extras2||[]).includes(myKuerzel);
        const eJs=e.fach.replace(/'/g,"\\'");

        html+=`<div class="vote-row">
          <span class="fach-cell"><b>${e.fach}</b></span>
          <span class="hj-label">1. HJ</span>`;

        if(e.slot1&&!iMine1){
          // Besetzt durch anderen
          html+=`<span class="assigned-chip">✓ ${e.slot1}</span>`;
          if((e.extras1||[]).length)html+=`<span class="extra-chip">+auch: ${e.extras1.join(', ')}</span>`;
          // Trotzdem Ja möglich
          if(myKuerzel&&!iInExtras1)html+=`<button class="vote-btn" onclick="voteExtra('${e.id}','slot1')" title="Auch Ja klicken (Hinweis erscheint)">+ Ja</button>`;
          if(iInExtras1)html+=`<span class="extra-chip">⚠ du auch</span>`;
        }else{
          if(myKuerzel){
            html+=`<button class="vote-btn ${iMine1?'yes':''}" onclick="toggleVote('${e.id}','slot1')">${iMine1?'✓ Ja (du)':'✓ Ja'}</button>`;
          }else{
            html+=`<span class="open-chip">noch offen</span>`;
          }
        }

        html+=`<span class="hj-label" style="margin-left:8px">2. HJ</span>`;

        if(e.slot2&&!iMine2){
          html+=`<span class="assigned-chip">✓ ${e.slot2}</span>`;
          if((e.extras2||[]).length)html+=`<span class="extra-chip">+auch: ${e.extras2.join(', ')}</span>`;
          if(myKuerzel&&!iInExtras2)html+=`<button class="vote-btn" onclick="voteExtra('${e.id}','slot2')" title="Auch Ja klicken">+ Ja</button>`;
          if(iInExtras2)html+=`<span class="extra-chip">⚠ du auch</span>`;
        }else{
          if(myKuerzel){
            html+=`<button class="vote-btn ${iMine2?'yes':''}" onclick="toggleVote('${e.id}','slot2')">${iMine2?'✓ Ja (du)':'✓ Ja'}</button>`;
          }else{
            html+=`<span class="open-chip">noch offen</span>`;
          }
        }

        // Eigenen Eintrag löschen (nur wenn man ihn angelegt hat)
        if(myKuerzel&&e.angelegtVon===myKuerzel){
          html+=`<button class="btn-danger" style="font-size:11px;padding:2px 6px;margin-left:auto" onclick="removeEintrag('${e.id}')">×</button>`;
        }
        html+=`</div>`;
      }

      // Neues Fach eintragen
      if(myKuerzel){
        html+=`<div class="new-fach-row">
          <input type="text" id="new-fach-${kl.id}" placeholder="Mein Fach, z.B. Biologie" style="max-width:200px;font-size:13px"/>
          <button onclick="addEintrag('${kl.id}')" style="font-size:12px">+ Fach eintragen</button>
        </div>`;
      }
      html+=`</div>`;
    }
    html+=`</div></div>`;
  });

  if(!(state.jahrgaenge||[]).length){
    html+=`<p style="color:#5f5e5a;font-size:13px;padding:16px 0">Noch keine Jahrgänge angelegt. Admin-Bereich öffnen.</p>`;
  }
  el.innerHTML=html;
}

function saveKuerzel(){
  const v=document.getElementById('kuerzel-input').value.trim().toUpperCase();
  if(!v)return;
  myKuerzel=v;
  localStorage.setItem('mb_kuerzel',v);
  render();
}

async function addEintrag(klId){
  if(!myKuerzel)return;
  const inp=document.getElementById('new-fach-'+klId);
  if(!inp||!inp.value.trim())return;
  const fach=inp.value.trim();
  if(!state.eintraege)state.eintraege=[];
  if(state.eintraege.find(e=>e.klId===klId&&e.fach===fach)){inp.value='';return;}
  state.eintraege.push({id:uid(),klId,fach,slot1:null,slot2:null,extras1:[],extras2:[],angelegtVon:myKuerzel});
  inp.value='';render();await save();
}

async function toggleVote(eId,slot){
  if(!myKuerzel)return;
  const e=state.eintraege.find(x=>x.id===eId);
  if(!e)return;
  if(e[slot]===myKuerzel){e[slot]=null;}
  else{e[slot]=myKuerzel;}
  render();await save();
}

async function voteExtra(eId,slot){
  if(!myKuerzel)return;
  const e=state.eintraege.find(x=>x.id===eId);
  if(!e)return;
  const extKey='extras'+(slot==='slot1'?'1':'2');
  if(!e[extKey])e[extKey]=[];
  if(!e[extKey].includes(myKuerzel))e[extKey].push(myKuerzel);
  render();await save();
}

async function removeEintrag(eId){
  state.eintraege=(state.eintraege||[]).filter(e=>e.id!==eId);
  render();await save();
}

function renderUebersicht(){
  const el=document.getElementById('tab-uebersicht');
  if(!el)return;
  let html='';
  (state.jahrgaenge||[]).forEach((jg,idx)=>{
    const color=JG_COLORS[idx%JG_COLORS.length];
    const klEintraege=jg.klassen.flatMap(kl=>(state.eintraege||[]).filter(e=>e.klId===kl.id).map(e=>({...e,klName:kl.name})));
    if(!klEintraege.length)return;
    html+=`<div class="jg-block" style="border-color:${color}55;margin-bottom:16px">
      <div class="jg-header" style="background:${color}">${jg.name}</div>
      <div class="jg-body" style="padding:0">
      <table><tr><th>Klasse</th><th>Fach</th><th>1. Halbjahr</th><th>2. Halbjahr</th><th>Status</th></tr>`;
    for(const e of klEintraege){
      const e1=(e.extras1||[]).length,e2=(e.extras2||[]).length;
      const conflict=e1>0||e2>0;
      const status=conflict?'<span class="badge badge-warn">⚠ Konflikt</span>':
        e.slot1&&e.slot2?'<span class="badge badge-done">vollständig</span>':
        (e.slot1||e.slot2)?'<span class="badge badge-open">teilweise</span>':
        '<span class="badge badge-no">offen</span>';
      html+=`<tr>
        <td style="color:${color};font-weight:500">${e.klName}</td>
        <td>${e.fach}</td>
        <td>${e.slot1||'—'}${e1?` <span style="color:#854f0b;font-size:11px">(+${e1})</span>`:''}</td>
        <td>${e.slot2||'—'}${e2?` <span style="color:#854f0b;font-size:11px">(+${e2})</span>`:''}</td>
        <td>${status}</td>
      </tr>`;
    }
    html+=`</table></div></div>`;
  });
  el.innerHTML=html||'<p style="color:#5f5e5a;font-size:13px">Noch keine Einträge.</p>';
}

function renderAdmin(){
  const el=document.getElementById('tab-admin');
  if(!el)return;
  let html=`<div class="card"><h2>Jahrgang hinzufügen</h2>
    <div class="row">
      <input type="text" id="new-jg-name" placeholder="z.B. Jahrgang 5"/>
      <button onclick="addJahrgang()">+ Jahrgang</button>
    </div></div>`;

  (state.jahrgaenge||[]).forEach((jg,idx)=>{
    const color=JG_COLORS[idx%JG_COLORS.length];
    html+=`<div class="card" style="border-left:4px solid ${color}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0;color:${color}">${jg.name}</h2>
        <button class="btn-danger" onclick="removeJahrgang('${jg.id}')">Entfernen</button>
      </div>
      <div class="row" style="margin-bottom:8px">
        <input type="text" id="new-kl-${jg.id}" placeholder="z.B. 5aG" style="max-width:160px"/>
        <button onclick="addKlasse('${jg.id}')">+ Klasse</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">`;
    for(const kl of jg.klassen){
      html+=`<span style="background:#f1efe8;border:1px solid #d3d1c7;border-radius:6px;padding:3px 10px;font-size:13px;display:flex;align-items:center;gap:6px">
        ${kl.name}
        <button class="btn-danger" style="font-size:11px;padding:1px 6px;border-radius:4px" onclick="removeKlasse('${jg.id}','${kl.id}')">×</button>
      </span>`;
    }
    html+=`</div></div>`;
  });

  html+=`<div class="card" style="margin-top:8px;border-left:4px solid #a32d2d">
    <h2>Abstimmungen zurücksetzen</h2>
    <p style="font-size:13px;color:#5f5e5a;margin-bottom:12px">Löscht alle Einträge und Abstimmungen. Jahrgänge und Klassen bleiben.</p>
    <div class="row">
      <input type="password" id="reset-pw" placeholder="Admin-Passwort zur Bestätigung" style="max-width:280px"/>
      <button class="btn-danger" onclick="resetVotes()">Zurücksetzen</button>
    </div>
    <span id="reset-pw-error" style="font-size:12px;color:#a32d2d;display:none">Falsches Passwort</span>
  </div>`;
  el.innerHTML=html;
}

async function addJahrgang(){const i=document.getElementById('new-jg-name');if(!i||!i.value.trim())return;if(!state.jahrgaenge)state.jahrgaenge=[];state.jahrgaenge.push({id:uid(),name:i.value.trim(),klassen:[]});i.value='';render();await save();}
async function removeJahrgang(id){if(!confirm('Jahrgang wirklich entfernen?'))return;state.jahrgaenge=state.jahrgaenge.filter(j=>j.id!==id);render();await save();}
async function addKlasse(jgId){const i=document.getElementById('new-kl-'+jgId);if(!i||!i.value.trim())return;const jg=state.jahrgaenge.find(j=>j.id===jgId);if(jg)jg.klassen.push({id:uid(),name:i.value.trim()});i.value='';render();await save();}
async function removeKlasse(jgId,klId){const jg=state.jahrgaenge.find(j=>j.id===jgId);if(jg)jg.klassen=jg.klassen.filter(k=>k.id!==klId);render();await save();}

async function resetVotes(){
  const pw=document.getElementById('reset-pw').value;
  const err=document.getElementById('reset-pw-error');
  if(pw!==ADMIN_PW){err.style.display='block';return;}
  err.style.display='none';
  state.eintraege=[];render();await save();
  document.getElementById('reset-pw').value='';
}

function showTab(name){
  ['abstimmung','uebersicht','admin'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'':'none';});
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['abstimmung','uebersicht','admin'][i]===name);});
}

function toggleAdminLogin(){
  if(isAdmin){
    isAdmin=false;
    document.getElementById('tab-btn-uebersicht').style.display='none';
    document.getElementById('tab-btn-admin').style.display='none';
    document.getElementById('admin-login-btn').textContent='🔒 Admin';
    document.getElementById('admin-login-box').style.display='none';
    showTab('abstimmung');
  }else{
    const box=document.getElementById('admin-login-box');
    box.style.display=box.style.display==='flex'?'none':'flex';
  }
}

function checkAdminPw(){
  const pw=document.getElementById('admin-pw-input').value;
  const err=document.getElementById('admin-pw-error');
  if(pw===ADMIN_PW){
    isAdmin=true;
    document.getElementById('admin-login-box').style.display='none';
    document.getElementById('tab-btn-uebersicht').style.display='';
    document.getElementById('tab-btn-admin').style.display='';
    document.getElementById('admin-login-btn').textContent='🔓 Admin';
    document.getElementById('admin-pw-input').value='';
    err.style.display='none';
  }else{err.style.display='';}
}

startAutoSync();
</script>
